    <!-- Typography & UI Foundation -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontSize: {
              'base': ['18px', '1.65'],
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
              serif: ['Montserrat', 'sans-serif'],
            },
            colors: {
              'authority-blue': '#1e3a5f',
              'signal-gold': '#C6922A',
              'steel-blue': '#4682B4',
              'primary-dark': '#020617',
              'surface-dark': '#0F172A',
              'border-dark': '#1E293B'
            },
            animation: {
              'reveal-up': 'reveal-up 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'shine': 'shine 2s infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              'reveal-up': {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'shine': {
                '0%': { transform: 'translateX(-200%) skewX(-25deg)' },
                '100%': { transform: 'translateX(200%) skewX(-25deg)' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          }
        }
      }
    </script>

    <style>
      body { 
        margin: 0; 
        padding: 0; 
        background: #F8FAFC; 
        font-family: 'Inter', sans-serif;
        font-size: 16px; /* Optimized base for mobile */
        line-height: 1.6;
        letter-spacing: 0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      @media (min-width: 768px) {
        body { font-size: 18px; line-height: 1.65; }
      }
      .dark body { background: #020617; }
      
      .legibility-container {
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
        width: 100%;
      }

      h1 { font-size: 36px; font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; }
      @media (min-width: 640px) { h1 { font-size: 64px; } }
      
      h2 { font-size: 28px; font-weight: 800; line-height: 1.2; }
      @media (min-width: 640px) { h2 { font-size: 40px; } }

      .boot-loader { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        height: 100vh; 
        background: #F8FAFC;
      }
      
      @media (prefers-color-scheme: dark) {
        .boot-loader { background: #020617; }
      }

      .spinner { width: 30px; height: 30px; border: 3px solid rgba(30, 58, 95, 0.1); border-top: 3px solid #C6922A; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      /* Improved Scrollbars */
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; }

      /* Touch Target Enhancements */
      button, a { min-height: 44px; min-width: 44px; }
    </style>
</head>
<body class="dark:bg-primary-dark">
    <div id="root">
        <div class="boot-loader">
            <div class="spinner"></div>
        </div>
    </div>
    <script type="module" src="./index.tsx"></script>
</body>
