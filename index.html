    <!-- Global Environment Shim -->
    <script>
      window.process = { env: {} };
      const envVars = [
        'VITE_FIREBASE_API_KEY', 'VITE_FIREBASE_AUTH_DOMAIN', 'VITE_FIREBASE_PROJECT_ID',
        'VITE_FIREBASE_STORAGE_BUCKET', 'VITE_FIREBASE_MESSAGING_SENDER_ID', 'VITE_FIREBASE_APP_ID',
        'VITE_MAILERLITE_FORM_ID', 'API_KEY'
      ];
      envVars.forEach(v => window.process.env[v] = "");
    </script>

    <!-- Typography & UI Foundation -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
              serif: ['Lora', 'serif'],
            },
            colors: {
              'authority-blue': '#1e3a5f',
              'signal-gold': '#C6922A',
              'steel-blue': '#4682B4',
              'primary-dark': '#020617',
              'surface-dark': '#0F172A',
              'border-dark': '#1E293B'
            }
          }
        }
      }

    <style>
      body { 
        margin: 0; 
        padding: 0; 
        background: #F8FAFC; 
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .dark body { background: #020617; }
      
      h1, h2, h3, h4, .font-serif {
        font-family: 'Lora', serif;
      }
      
      .font-display {
        font-family: 'Montserrat', sans-serif;
      }

      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .boot-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Montserrat', sans-serif; }
      .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top: 3px solid #C6922A; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; }
    </style>
</head>
<body class="dark:bg-primary-dark">
    <div id="root">
        <div class="boot-loader">
            <div class="spinner"></div>
            <p style="font-size: 10px; font-weight: 900; letter-spacing: 0.4em; text-transform: uppercase; color: #64748B;">Initializing LaunchPath™ OS</p>
        </div>
    </div>
